name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  python-ruff:
    name: Python - ruff (lint + format check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          args: "check ./src"

      - name: Ruff format (check)
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff ./src"

  frontend-biome:
    name: Frontend - biome (lint + format check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Biome
        uses: biomejs/setup-biome@v2

      - name: Biome CI
        run: biome ci
